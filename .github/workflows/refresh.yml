name: Refresh Code
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate device code and update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RESP=$(curl -s -X POST "https://login.microsoftonline.com/gl.alps.com/oauth2/v2.0/devicecode" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "client_id=d3590ed6-52b3-4102-aeff-aad2292ab01c&scope=https://graph.microsoft.com/.default offline_access")
          
          USER_CODE=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('user_code',''))")
          DEVICE_CODE=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('device_code',''))")
          
          if [ -n "$USER_CODE" ] && [ "$USER_CODE" != "None" ]; then
            echo "{\"user_code\":\"$USER_CODE\",\"device_code\":\"$DEVICE_CODE\",\"client_id\":\"d3590ed6-52b3-4102-aeff-aad2292ab01c\",\"tenant\":\"gl.alps.com\"}" > code.json
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git add code.json
            git diff --cached --quiet || git commit -m "refresh" && git push
          fi
